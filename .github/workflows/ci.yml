name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]
  # Reusable desde cd-backend.yml (gate de calidad antes de desplegar a main).
  workflow_call: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Postgres dummy URL para que `prisma generate` no falle en CI.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Tests + coverage
        run: pnpm test:cov

      - name: Build
        run: pnpm build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
