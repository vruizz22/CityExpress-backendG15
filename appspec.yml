version: 0.0
os: linux

# Copia el compose y el tag de imagen a /opt/cityexpress. El .env de prod (con
# los secretos) ya vive en la EC2 y NO se toca aquí. Se usa OVERWRITE en el
# create-deployment para reemplazar el compose puesto a mano en E1.
files:
  - source: docker-compose.prod.yml
    destination: /opt/cityexpress
  - source: image_tag
    destination: /opt/cityexpress

hooks:
  AfterInstall:
    # 900s (no 300): el primer pull de imágenes nuevas en la t3.micro tarda
    # ~6 min (imágenes grandes). Con 300s el hook moría a mitad del pull →
    # HEALTH_CONSTRAINTS. 900 da margen aunque no haya capas cacheadas.
    - location: deploy/pull_and_up.sh
      timeout: 900
      runas: root
  ValidateService:
    - location: deploy/healthcheck.sh
      timeout: 180
      runas: root
