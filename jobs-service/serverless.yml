service: cityexpress-jobs-worker
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'prod'}
  # El rol de ejecución por defecto (logs en CloudWatch) basta: la Lambda solo
  # calcula rutas, no toca otros servicios AWS.

package:
  individually: true

functions:
  compute:
    handler: src/handler.compute
    timeout: 60
    memorySize: 256
    # Nombre resultante: cityexpress-jobs-worker-${stage}-compute
    # (ese valor va en WORKER_LAMBDA_NAME del worker BullMQ).

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    target: node20
    platform: node
